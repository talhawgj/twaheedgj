<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    
    <!-- Gradient for text -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFED4E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Ambient glow effect -->
  <circle cx="600" cy="315" r="400" fill="#FFD700" opacity="0.08" filter="url(#blur)"/>
  <circle cx="200" cy="150" r="300" fill="#FFC700" opacity="0.05" filter="url(#blur)"/>
  
  <!-- Blur filter -->
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>
  </defs>
  
  <!-- Main content container -->
  <g id="content">
    <!-- Primary heading -->
    <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#goldGradient)" letter-spacing="2">
      TALHA WAHEED
    </text>
    
    <!-- Subtitle line 1 -->
    <text x="600" y="290" font-family="Arial, sans-serif" font-size="42" font-weight="500" text-anchor="middle" fill="#FFFFFF" letter-spacing="1">
      Full-Stack GIS Developer
    </text>
    
    <!-- Subtitle line 2 -->
    <text x="600" y="345" font-family="Arial, sans-serif" font-size="36" font-weight="400" text-anchor="middle" fill="#BFBFBF" letter-spacing="0.5">
      Spatial Data Engineer
    </text>
    
    <!-- Decorative line -->
    <line x1="300" y1="400" x2="900" y2="400" stroke="#FFD700" stroke-width="3" opacity="0.7"/>
    
    <!-- Specializations -->
    <text x="600" y="470" font-family="Arial, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#BFBFBF">
      FastAPI · PostGIS · Mapbox · ArcGIS · Remote Sensing · Next.js
    </text>
    
    <!-- Location/CTA -->
    <text x="600" y="555" font-family="Arial, sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="#FFD700" opacity="0.9">
      Building scalable geospatial applications
    </text>
  </g>
</svg>