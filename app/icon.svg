<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#0F172A"/>

  <!-- Geometric triangle accent - top left (Cyan) -->
  <polygon points="0,0 12,0 0,12" fill="#22D3EE" opacity="0.3"/>

  <!-- Main "T" Shape - Modern Stylized -->
  <!-- Horizontal bar of T - Yellow gradient -->
  <rect x="8" y="10" width="24" height="3.5" rx="1.75" fill="url(#yellowGrad)"/>
  
  <!-- Vertical stem of T - Split design with cyan accent -->
  <rect x="16" y="13" width="8" height="18" rx="4" fill="url(#yellowGrad)"/>
  
  <!-- Cyan accent stripe on right side of stem -->
  <rect x="22" y="13" width="2" height="18" rx="1" fill="url(#cyanGrad)" opacity="0.9"/>

  <!-- Geometric accent - bottom right corner (Yellow) -->
  <polygon points="40,28 40,40 28,40" fill="#F59E0B" opacity="0.4"/>

  <!-- Corner accent dots -->
  <circle cx="35" cy="6" r="1.2" fill="#22D3EE" opacity="0.6"/>
  <circle cx="8" cy="35" r="1.2" fill="#FBBF24" opacity="0.6"/>

  <!-- Subtle border with gradient -->
  <rect x="1" y="1" width="38" height="38" rx="7.5" stroke="url(#yellowGrad)" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>
