<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="38" height="38" rx="9.5" stroke="url(#fg)" stroke-width="0.6" stroke-opacity="0.4" fill="none"/>

  <!-- T : cap -->
  <rect x="6" y="11" width="13" height="2.8" rx="1.2" fill="url(#fg)"/>
  <!-- T : stem -->
  <rect x="11" y="13.8" width="3" height="15.5" rx="1.2" fill="url(#fg)"/>

  <!-- W : four legs -->
  <path d="M18 11.5 L20.5 29.5" stroke="url(#fg)" stroke-width="2.7" stroke-linecap="round"/>
  <path d="M20.5 29.5 L24 19"   stroke="url(#fg)" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M24 19 L27.5 29.5"   stroke="url(#fg)" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M27.5 29.5 L30 11.5" stroke="url(#fg)" stroke-width="2.7" stroke-linecap="round"/>

  <!-- Accent dot -->
  <circle cx="35" cy="35" r="1.5" fill="url(#fg)" fill-opacity="0.6"/>
</svg>
